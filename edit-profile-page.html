    <div id="header-body-footer" class="">
        <header>
            <nav class="nav-wrapper indigo">

                <a href="#!" id="brand" class="hide-on-small-only left font-style">Azure's Embrace</a>

        <div id="body-footer">

            <div id="main-part" class="container row">
                <div class="col s12 m5 main-part-unit">
                    <div class="input-field col s12">
                        <input id="inpNIK" type="text" class="validate">
                        <label for="inpNIK">NIK</label>
                    </div>
                    <div class="input-field col s4">
                        <input id="inpPhoneC" type="text" class="validate">
                        <label for="inpPhoneC">Country Code</label>
                    </div>
                    <div class="input-field col s8">
                        <input id="inpPhone" type="text" class="validate">
                        <label for="inpPhone">Phone</label>
                    </div>
                    <div id="pp" class="input-field col s12">
                        <select id="inpType">
                            <option value="" disabled selected>Choose your option</option>
                            <option value="civilian">Civilian</option>
                            <option value="guild-member">Guild Member</option>
                        </select>
                        <label for="inpType">
                            Member Type
                        </label>
                    </div>
                    <div class="input-field col s12">
                        <!--<input id="inpJoinPeriod" type="text" class="validate">-->
                        <!--<label for="inpJoinPeriod">Join Period</label>-->
                        <p class="range-field">
                            <input type="range" id="inpJoinPeriod" min="0" max="100" />
                            <label for="inpJoinPeriod">Join Period (in months)</label>
                        </p>
                    </div>
                    <div class="input-field col s12">
                        <input id="inpProfession" type="text" class="validate">
                        <label for="inpProfession">Profession</label>
                    </div>
                    <div class="input-field col s12">
                        <div id="skill-set" class="chips chips-initial">
                        </div>
                        <label for="skill-set">
                            Skill set
                        </label>
                    </div>
                    <div class="input-field col s12">
                        <textarea id="description" class="materialize-textarea"></textarea>
                        <label for="description">Description</label>
                    </div>
                </div>
                <div class="col s12 m5 flow-text offset-m2 main-part-unit">
                    <form class="row">
                        <div class="input-field col s12">
                            <input id="inpAddress" type="text" class="validate">
                            <label for="inpAddress">Address</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="date" type="text" class="datepicker">
                            <label for="date">
                                Birthdate
                            </label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpFullname" type="text" class="validate">
                            <label for="inpFullname">Full Name</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpUsername" type="text" class="validate">
                            <label for="inpUsername">Username</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpP" type="password" class="validate">
                            <label for="inpP">Password</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpP2" type="password" class="validate">
                            <label for="inpP2">Re-enter Password</label>
                        </div>
                        <div class="file-field input-field col s12">
                            <div class="btn">
                                <span>Browse</span>
                                <input type="file" />
                            </div>

                            <div class="file-path-wrapper">
                                <input class="file-path validate" type="text"
                                       placeholder="Picture" />
                            </div>
                        </div>
                    </form>
                    <div>
                        <form action="#" class="flow-text">
                            <p>
                                <label>
                                    <input type="checkbox" id="inpAutoGen" />
                                    <span>Auto-generate password?</span>
                                </label>
                            </p>
                        </form>
                    </div>
                    <div class="row">
                        <a class="col waves-effect waves-light btn left indigo s5">Save changes</a>
                        <a class="col waves-effect waves-light btn right indigo s5">Clear all</a>
                    </div>
                    <div class="row">

                    </div>

                <div class="col s12">
                    <span class="right" id="footer-text">Address: Danau Matana street D.II No. 52</span>

    <script>

        const Calendar = document.querySelector('.datepicker');

            format: 'dd-mmmm-yyyy',
            showClearBtn: true,
            i18n: {
                clear: 'remove',
                done: 'yes',
                cancel: 'no'
            }
        })
        $('#regBtn').click(function () {
            validate($("#inpNIK").val(), $("#inpPhoneC").val(), $("#inpPhone").val(), $("#inpType").val(), $("#inpJoinPeriod").val(),
                $("#inpProfession").val(), M.Chips.getInstance($('#skill-set')).chipsData, $("#date").val(), $("#inpAddress").val(),
                $("#inpFullname").val(), $("#inpUsername").val(), $("#inpP").val(), $("#inpP2").val(), document.getElementById("inpAutoGen").checked)
        });
        $(document).ready(function () {
            editSetup(document.getElementById("inpNIK"), document.getElementById("inpPhoneC"), document.getElementById("inpPhone"), document.getElementById("inpType"), document.getElementById("inpJoinPeriod"),
                document.getElementById("inpProfession"), 0, document.getElementById("date"), document.getElementById("inpAddress"),
                document.getElementById("inpFullname"), document.getElementById("inpUsername"), document.getElementById("inpP"), document.getElementById("inpP2"), document.getElementById("inpAutoGen").checked,
                document.getElementById("description"));
            $('#inpType').val(sessionStorage.getItem("Type"));
            let skillArray = sessionStorage.getItem("Skill");
            let iData = []
            for (i = 0; i < skillArray.length; i++) {
                iData.push({ tag : skillArray[i] });
            }
            //for (i = 0; i < iData.length; i++) {
            //    M.Chips.getInstance($('#skill-set')).addChips(iData[i]);
            //}

            //picker.set('select', sessionStorage.getItem("Date"), { format: 'dd-mm-yyyy' })
        })

            function () {
                if (isLoggedin()) {
                    userPageSetup(document.getElementById("username"),
                        document.getElementById("profession"),
                        document.getElementById("type"),
                        document.getElementById("desc"));

                    navbarLoggedSetup(document.getElementById("main-page-nav"),
                        document.getElementById("jobs-page-nav"),
                        document.getElementById("edit-profile-page-nav"),
                        document.getElementById("help-page-nav"),
                        document.getElementById("admin-page-nav")
                    )
                }
                else {
                    navbarSetup(document.getElementById("main-page-nav"),
                        document.getElementById("jobs-page-nav"),
                        document.getElementById("edit-profile-page-nav"),
                        document.getElementById("help-page-nav"),
                        document.getElementById("admin-page-nav"))
                }
            }
        );
