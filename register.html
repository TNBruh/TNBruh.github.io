        M.Datepicker.init(Calendar, {

                $("#inpFullname").val(), $("#inpUsername").val(), $("#inpP").val(), $("#inpP2").val(), document.getElementById("inpAutoGen").checked)

        function onSignIn(googleUser) {
            let profile = googleUser.getBasicProfile();
            let id_token = googleUser.getAuthResponse().id_token
            //console.log('ID: ' + profile.getId());
            //console.log('Full Name: ' + profile.getName());
            //console.log('Given Name: ' + profile.getGivenName());
            //console.log('Family Name: ' + profile.getFamilyName());
            //console.log('Image URL: ' + profile.getImageUrl());
            //console.log('Email: ' + profile.getEmail());
            //console.log(id_token);
            regRecord(id_token, profile.getName(), profile.getGivenName());
            //sessionStorage.setItem("regSSO", "true");
            //alert("Data Stored. Proceed to register page.")
            //location.replace("main-page.html");
            regSetup(document.getElementById("inpNIK"), document.getElementById("inpFullname"), document.getElementById("inpUsername"));
            //gapi.auth2.getAuthInstance.signOut();
        }
        $(document).ready(function () {
            if (sessionStorage.getItem("regSSO") == "true") {
                sessionStorage.setItem("regSSO", "false");
                regSetup(document.getElementById("inpNIK"),

                    document.getElementById("inpUsername"));

            if (isLoggedin()) {

                    document.getElementById("jobs-page-nav"),
                    document.getElementById("edit-profile-page-nav"),
                    document.getElementById("help-page-nav"),
                    document.getElementById("admin-page-nav"))
                }
