<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->
    <link type="text/css" rel="stylesheet" href="css/materialize.min.css" media="screen,projection" />
    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!---->
    <script type="text/javascript"
            src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.3/js/materialize.min.js">
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var elems = document.querySelectorAll('.chips');
            var instances = M.Chips.init(elems);
        });
        $(document).ready(function () {
            $('select').material_select();
            $('.datepicker').datepicker({ format: "dd/mm/yyyy" });
        });
    </script>
    <!---->

    <title></title>
    <style>
        .showbox {
            border: 1px dotted black;
        }

        #header-body-footer {
            background-color: azure;
            min-height:100vh;
        }

        #body-footer {
            margin-top: 5%;
        }

        header {
        }

        #header-logo {
            height: 100%;
            width: auto;
        }

        .h-margin-balance {
            margin-left: auto;
            margin-right: auto;
        }

        #main-part {
        }

        .main-part-unit {
            margin-bottom: 4%;
        }

        .font-style {
            font-family: 'Century Gothic';
        }

        h3 {
            margin-top: 0px;
        }

        .container {
            width: 85%;
        }

        hr {
            border-color: blue;
        }

        .btn {
            min-width: 35%;
            margin-bottom: 3%;
            margin-left: 2%;
            margin-right: 2%;
        }

        footer {
            margin-bottom: 0px !important;
        }

        #news {
            max-height: 40vh;
            overflow: auto;
        }

        #news-part {
        }

        #footer-text {
            font-size: 100%;
        }
    </style>
</head>
<body>

    <div id="header-body-footer" class="">
        <header>
            <nav class="nav-wrapper indigo">
                <img id="header-logo" src="Logo.png" alt="bruh" />
                <a href="#!" class="brand-logo flow-text hide-on-small-only font-style">Azure's Embrace</a>
                <ul class="right">
                    <li><a href="main-page.html">Home</a></li>
                    <li><a href=#>Jobs</a></li>
                    <li><a href=#>Account</a></li>
                </ul>
            </nav>
        </header>
        <div id="body-footer">
            <div id="main-part" class="container row">
                <div class="col s12 m5 main-part-unit">
                    <div class="input-field col s12">
                        <input id="inpNIK" type="text" class="validate">
                        <label for="inpNIK">NIK</label>
                    </div>
                    <div class="input-field col s12">
                        <select id="inpType">
                            <option value="civilian">Civilian</option>
                            <option value="guild-member">Guild Member</option>
                        </select>
                        <label for="inpType">
                            Member Type
                        </label>
                    </div>
                    <div class="input-field col s12">
                        <input id="inpJoinPeriod" type="text" class="validate">
                        <label for="inpJoinPeriod">Join Period</label>
                    </div>
                    <div class="input-field col s12">
                        <input id="inpProfession" type="text" class="validate">
                        <label for="inpProfession">Profession</label>
                    </div>
                    <div class="input-field col s12">
                        <div id="skill-set" class="chips chips-placeholder">
                        </div>
                        <label for="skill-set">
                            Skill set
                        </label>
                    </div>
                </div>
                <div class="col s12 m5 flow-text offset-m2 main-part-unit">
                    <form class="row">
                        <div class="input-field col s12">
                            <input id="inpAddress" type="text" class="validate">
                            <label for="inpAddress">Address</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="date" type="text" class="datepicker">
                            <label for="date">
                                Birthdate
                            </label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpFullName" type="text" class="validate">
                            <label for="inpUFullName">Full Name</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpUsername" type="text" class="validate">
                            <label for="inpUsername">Username</label>
                        </div>
                        <div class="input-field col s12">
                            <input id="inpP" type="password" class="validate">
                            <label for="inpP">Password</label>
                        </div>
                    </form>
                    <div class="row">
                        <a href="main-page.html" class="waves-effect waves-light btn indigo s12"><i class="material-icons left">cloud</i>Register</a>
                    </div>
                </div>
            </div>
            <footer class="row">
                <div class="col s12">
                    <span class="right" id="footer-text">Address: Danau Matana street D.II No. 52</span>
                </div>
            </footer>
        </div>
    </div>

    <!--JavaScript at end of body for optimized loading-->
    <script type="text/javascript" src="js/materialize.min.js"></script>
    <script>
        const Calendar = document.querySelector('.datepicker');
        M.Datepicker.init(Calendar, {
            format: 'dd-mmmm-yyyy',
            showClearBtn: true,
            i18n: {
                clear: 'remove',
                done: 'yes',
                cancel: 'no'
            }
        })
    </script>
</body>
</html>
